<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Dangvanphungprogame</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    background: linear-gradient(135deg,#020b1c,#0a1f44,#000);
    color:white;
}

/* HEADER */
.header{
    text-align:center;
    padding:60px 20px;
}

.header img{
    width:140px;
    border-radius:50%;
    border:3px solid #00bfff;
    box-shadow:0 0 25px #00bfff;
}

/* SECTION */
.section{
    padding:40px 20px;
}

.card{
    max-width:900px;
    margin:20px auto;
    padding:30px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border:1px solid rgba(0,191,255,0.3);
}

/* HOBBY */
.hobby{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:20px;
}

.box{
    width:80%;
    max-width:300px;
    padding:20px;
    border-radius:15px;
    text-align:center;
    background:rgba(255,255,255,0.05);
    border:1px solid #00bfff;
    cursor:pointer;
}

.box:hover{
    transform:scale(1.1);
    box-shadow:0 0 30px #00bfff;
}

/* SOCIAL */
.social{
    text-align:center;
}

.social a{
    color:#ccc;
    font-size:28px;
    margin:0 10px;
}

.social a:hover{
    color:#00bfff;
}

/* MAP */
iframe{
    border-radius:15px;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
    z-index:999;
}

.modal-content{
    background:#111;
    padding:20px;
    border-radius:15px;
    text-align:center;
    border:2px solid #0f0;
}

.close{
    float:right;
    cursor:pointer;
    font-size:25px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <img src="058563264cd7c2899bc6.jpg">
    <h1>Đặng Văn Phụng</h1>
    <p>Sinh viên CNTT - Part Time</p>
</div>

<!-- GIỚI THIỆU -->
<div class="section">
    <div class="card">
        <h2>📝 Một chút về tôi</h2>
        <p>Xin chào, tôi là Đặng Văn Phụng.</p>
        <p>Tôi thích lập trình và cuộc sống đơn giản.</p>
        <p>Hiện tại tôi đang học CNTT năm nhất.</p>
    </div>
</div>

<!-- SỞ THÍCH -->
<div class="section">
    <div class="card">
        <h2>Sở thích</h2>
        <div class="hobby">
            <div class="box" onclick="openModal('game')">🎮 Chơi game</div>
            <div class="box" onclick="openModal('code')">💻 Lập trình</div>
            <div class="box" onclick="openModal('music')">🎵 Nghe nhạc</div>
        </div>
    </div>
</div>

<!-- CONTACT -->
<div class="section">
    <div class="card">
        <h2>📬 Liên hệ</h2>
        <p>📧 thingphung1245@gmail.com</p>
        <div class="social">
            <a href="https://facebook.com/thinhphung07" target="_blank"><i class="fab fa-facebook"></i></a>
            <a href="https://tiktok.com/@dvp.138" target="_blank"><i class="fab fa-tiktok"></i></a>
        </div>
    </div>
</div>

<!-- MAP -->
<div class="section">
    <div class="card">
        <h2>📍 Vị trí</h2>
        <iframe src="https://www.google.com/maps?q=10.997778,106.751056&z=15&output=embed"
                width="100%" height="350"></iframe>
    </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">×</span>
        <h2 id="modal-title"></h2>
        <div id="modal-body"></div>
    </div>
</div>

<script>
let gameInterval;

function openModal(type){
    const title = document.getElementById("modal-title");
    const body = document.getElementById("modal-body");

    if(type === "game"){
        title.innerHTML = "🐍 Snake Game";
        body.innerHTML = `
        <canvas id="gameCanvas" width="300" height="300"></canvas>
        <p>Điểm: <span id="score">0</span></p>
        `;
        startGame();
    }

    if(type === "code"){
        title.innerHTML = "💻 Lập trình";
        body.innerHTML = "Tôi thích code web bằng HTML, CSS, JS.";
    }

    if(type === "music"){
        title.innerHTML = "🎵 Nghe nhạc";
        body.innerHTML = "Tôi thích nhạc chill và remix.";
    }

    document.getElementById("modal").style.display = "flex";
}

function closeModal(){
    document.getElementById("modal").style.display = "none";
    clearInterval(gameInterval);
}

function startGame(){
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const box = 15;
    let snake = [{x:150, y:150}];
    let direction = "RIGHT";
    let score = 0;

    window.onkeydown = function(e){
        if(e.key === "ArrowUp" && direction !== "DOWN") direction = "UP";
        else if(e.key === "ArrowDown" && direction !== "UP") direction = "DOWN";
        else if(e.key === "ArrowLeft" && direction !== "RIGHT") direction = "LEFT";
        else if(e.key === "ArrowRight" && direction !== "LEFT") direction = "RIGHT";
    }

    let food = {
        x: Math.floor(Math.random()*20)*box,
        y: Math.floor(Math.random()*20)*box
    };

    gameInterval = setInterval(draw, 120);

    function draw(){
        ctx.fillStyle = "#000";
        ctx.fillRect(0,0,300,300);

        snake.forEach((s,i)=>{
            ctx.fillStyle = i==0 ? "#0f0" : "#0a0";
            ctx.fillRect(s.x, s.y, box, box);
        });

        ctx.fillStyle = "red";
        ctx.fillRect(food.x, food.y, box, box);

        let headX = snake[0].x;
        let headY = snake[0].y;

        if(direction==="UP") headY -= box;
        if(direction==="DOWN") headY += box;
        if(direction==="LEFT") headX -= box;
        if(direction==="RIGHT") headX += box;

        if(headX === food.x && headY === food.y){
            score++;
            document.getElementById("score").innerText = score;
            food = {
                x: Math.floor(Math.random()*20)*box,
                y: Math.floor(Math.random()*20)*box
            };
        } else {
            snake.pop();
        }

        let newHead = {x:headX,y:headY};

        if(headX<0||headY<0||headX>=300||headY>=300||
           snake.some(s=>s.x===newHead.x&&s.y===newHead.y)){
            clearInterval(gameInterval);
            alert("💀 Game Over! Điểm: "+score);
            closeModal();
        }

        snake.unshift(newHead);
    }
}
</script>

</body>
</html>
