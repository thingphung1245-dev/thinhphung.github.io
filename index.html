<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Dangvanphungprogame</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    background: linear-gradient(135deg,#020b1c,#0a1f44,#000);
    color:white;
}

/* HEADER */
.header{
    text-align:center;
    padding:60px 20px;
}

.header img{
    width:140px;
    border-radius:50%;
    border:3px solid #00bfff;
    box-shadow:0 0 25px #00bfff;
}

/* TYPEWRITER */
#name{
    font-size:32px;
    margin-top:15px;
    color:#00bfff;
    border-right:3px solid #00bfff;
    padding-right:5px;
    animation: blink 0.7s infinite;
}

@keyframes blink{
    50%{border-color:transparent;}
}

/* CARD */
.card{
    max-width:900px;
    margin:20px auto;
    padding:30px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border:1px solid rgba(0,191,255,0.3);
    box-shadow:0 0 20px rgba(0,191,255,0.3);
}

/* HOBBY */
.hobby{
    display:flex;
    justify-content:center;
    gap:20px;
}

.box{
    padding:20px;
    border-radius:15px;
    border:1px solid #00bfff;
    cursor:pointer;
}

/* SOCIAL */
.social{
    text-align:center;
    margin-top:10px;
}

.social a{
    color:#ccc;
    font-size:30px;
    margin:0 10px;
}

.social a:hover{
    color:#00bfff;
}

/* MAP */
iframe{
    border-radius:15px;
}

/* MEME */
#meme{
    position:fixed;
    bottom:20px;
    right:20px;
    width:110px;
    animation: jump 1s infinite;
}

@keyframes jump{
    50%{transform:translateY(-20px);}
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:#111;
    padding:20px;
    border-radius:15px;
}

</style>
</head>

<body>

<div class="header">
<img src="058563264cd7c2899bc6.jpg">
<h1 id="name"></h1>
<p>Sinh viên CNTT - Part Time</p>
</div>

<div class="card">
<h2>📝 Một chút về tôi</h2>
<p>Xin chào, tôi là Đặng Văn Phụng.</p>
</div>

<div class="card">
<h3>👤 Thông tin cá nhân</h3>
<p>📅 13 / 08 / 2007</p>
<p>📍 TP.HCM</p>
<p>🏠 Nghệ An</p>
</div>

<div class="card">
<h2>Sở thích</h2>
<div class="hobby">
<div class="box" onclick="openModal('game')">🎮 Game</div>
<div class="box" onclick="openModal('code')">💻 Code</div>
<div class="box" onclick="openModal('music')">🎵 Nhạc</div>
</div>
</div>

<!-- 🔥 LIÊN HỆ -->
<div class="card">
<h2>📬 Liên hệ</h2>

<p style="text-align:center;color:#00bfff;">
📧 thingphung1245@gmail.com
</p>

<div class="social">
<a href="https://facebook.com/thinhphung07" target="_blank">
<i class="fab fa-facebook"></i>
</a>

<a href="https://tiktok.com/@dvp.138" target="_blank">
<i class="fab fa-tiktok"></i>
</a>
</div>

</div>

<!-- 🔥 GOOGLE MAP -->
<div class="card">
<h2>📍 Vị trí</h2>

<iframe 
src="https://www.google.com/maps?q=10.997778,106.751056&z=15&output=embed"
width="100%" height="350">
</iframe>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">
<h3 id="title"></h3>
<p id="text"></p>
<button onclick="closeModal()">Đóng</button>
</div>
</div>

<!-- MEME -->
<img id="meme"
src="https://i.imgur.com/8QfQKQG.gif"
onerror="this.src='https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif'">

<script>

/* TYPE LOOP */
const text = "Đặng Văn Phụng";
let i = 0, del = false;

function run(){
    let el = document.getElementById("name");

    if(!del){
        el.innerHTML = text.substring(0,i++);
        if(i>text.length){ del=true; setTimeout(run,1000); return;}
    }else{
        el.innerHTML = text.substring(0,i--);
        if(i==0){ del=false;}
    }

    setTimeout(run, del?50:100);
}
run();

/* MODAL */
function openModal(type){
    let t = document.getElementById("title");
    let c = document.getElementById("text");

    if(type=="game"){ t.innerHTML="🎮 Game"; c.innerHTML="Tôi thích chơi game"; }
    if(type=="code"){ t.innerHTML="💻 Code"; c.innerHTML="Tôi thích lập trình"; }
    if(type=="music"){ t.innerHTML="🎵 Nhạc"; c.innerHTML="Tôi thích nghe nhạc"; }

    document.getElementById("modal").style.display="flex";
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
