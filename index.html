<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Dangvanphungprogame</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI', sans-serif;}

body{
    background: linear-gradient(-45deg,#020b1c,#0a1f44,#001f3f,#000);
    background-size: 400% 400%;
    animation: gradientMove 12s ease infinite;
    color:white;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* MENU */
.navbar{
    position:fixed;
    top:0;left:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:15px 30px;
    background:rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    z-index:1000;
}

.logo{color:#00bfff;font-size:26px;font-weight:bold;}

.menu a{
    color:#ccc;
    margin-left:15px;
    text-decoration:none;
}

.menu a:hover{color:#00bfff;}

/* BACKGROUND FIX */
#bgCanvas{
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    z-index:-100;
    pointer-events:none;
}

/* CONTENT */
.header{
    margin-top:90px;
    text-align:center;
}

.header img{
    width:130px;
    border-radius:50%;
    border:3px solid #00bfff;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.9);
    z-index:9999;
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:#111;
    padding:20px;
    border-radius:15px;
    text-align:center;
}

/* GAME BUTTON MOBILE */
.controls{
    margin-top:15px;
    display:grid;
    grid-template-columns:repeat(3,60px);
    gap:10px;
    justify-content:center;
}

.btn{
    background:#00bfff;
    border:none;
    padding:10px;
    border-radius:10px;
    font-size:18px;
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">DvP</div>
<div class="menu">
<a href="#">Home</a>
<a href="#" onclick="openModal()">Game</a>
</div>
</div>

<canvas id="bgCanvas"></canvas>

<div class="header">
<img src="058563264cd7c2899bc6.jpg">
<h1 id="name"></h1>
</div>

<div id="modal" class="modal">
<div class="modal-content">
<span onclick="closeModal()" style="cursor:pointer">X</span>
<div id="modal-body"></div>
</div>
</div>

<script>

/* TEXT */
const text="Đặng Văn Phụng";
let i=0;
function typeEffect(){
document.getElementById("name").innerHTML=text.substring(0,i++);
if(i<=text.length) setTimeout(typeEffect,100);
}
typeEffect();

/* GAME */
let dir="RIGHT";
let gameInterval;

function openModal(){
const body=document.getElementById("modal-body");

body.innerHTML=`
<canvas id="gameCanvas" width="300" height="300"></canvas>
<p>Điểm: <span id="score">0</span></p>

<div class="controls">
<div></div>
<button class="btn" onclick="dir='UP'">⬆️</button>
<div></div>
<button class="btn" onclick="dir='LEFT'">⬅️</button>
<button class="btn" onclick="dir='DOWN'">⬇️</button>
<button class="btn" onclick="dir='RIGHT'">➡️</button>
</div>
`;

document.getElementById("modal").style.display="flex";
setTimeout(startGame,100);
}

function closeModal(){
document.getElementById("modal").style.display="none";
clearInterval(gameInterval);
}

function startGame(){
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");

let grid=15;
let snake=[{x:10,y:10}];
let food={x:5,y:5};
let score=0;

document.onkeydown=e=>{
if(e.key==="ArrowUp" && dir!=="DOWN") dir="UP";
if(e.key==="ArrowDown" && dir!=="UP") dir="DOWN";
if(e.key==="ArrowLeft" && dir!=="RIGHT") dir="LEFT";
if(e.key==="ArrowRight" && dir!=="LEFT") dir="RIGHT";
};

gameInterval=setInterval(()=>{
ctx.fillStyle="#000";
ctx.fillRect(0,0,300,300);

let head={...snake[0]};
if(dir==="UP") head.y--;
if(dir==="DOWN") head.y++;
if(dir==="LEFT") head.x--;
if(dir==="RIGHT") head.x++;

snake.unshift(head);

if(head.x===food.x && head.y===food.y){
score++;
document.getElementById("score").innerText=score;
food={
x:Math.floor(Math.random()*20),
y:Math.floor(Math.random()*20)
};
}else{
snake.pop();
}

ctx.fillStyle="red";
ctx.fillRect(food.x*grid,food.y*grid,grid,grid);

ctx.fillStyle="lime";
snake.forEach(s=>ctx.fillRect(s.x*grid,s.y*grid,grid,grid));

if(head.x<0||head.y<0||head.x>=20||head.y>=20){
alert("Game Over");
closeModal();
}

},120);
}

/* BACKGROUND FIX */
const canvasBg=document.getElementById("bgCanvas");
const ctxBg=canvasBg.getContext("2d");

function resize(){
canvasBg.width=window.innerWidth;
canvasBg.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let p=[];
for(let i=0;i<100;i++){
p.push({x:Math.random()*canvasBg.width,y:Math.random()*canvasBg.height});
}

function draw(){
ctxBg.clearRect(0,0,canvasBg.width,canvasBg.height);
ctxBg.fillStyle="#00bfff";

p.forEach(a=>{
ctxBg.fillRect(a.x,a.y,2,2);
a.y+=0.5;
if(a.y>canvasBg.height){
a.y=0;
a.x=Math.random()*canvasBg.width;
}
});

requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
