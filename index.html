<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Dangvanphungprogame</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

/* 🔥 BACKGROUND ANIME XỊN */
body{
    background: linear-gradient(-45deg,#020b1c,#0a1f44,#001f3f,#000);
    background-size: 400% 400%;
    animation: gradientMove 12s ease infinite;
    color:white;
    overflow-x:hidden;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* 🔥 CANVAS BACKGROUND */
#bgCanvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-2;
}

/* 🔥 ÁNH SÁNG CHUỘT */
#cursor-light{
    position:fixed;
    width:300px;
    height:300px;
    background: radial-gradient(circle, rgba(0,191,255,0.25), transparent 70%);
    pointer-events:none;
    transform:translate(-50%,-50%);
    z-index:-1;
}

/* HEADER */
.header{
    text-align:center;
    padding:60px 20px;
}

.header img{
    width:140px;
    border-radius:50%;
    border:3px solid #00bfff;
    box-shadow:0 0 25px #00bfff;
}

/* CHỮ CHẠY */
#name{
    color:#00bfff;
    border-right:3px solid #00bfff;
    padding-right:5px;
    white-space:nowrap;
    overflow:hidden;
    display:inline-block;
    animation: blink 0.7s infinite;
}

@keyframes blink{
    0%,100%{border-color:#00bfff;}
    50%{border-color:transparent;}
}

/* SECTION */
.section{
    padding:40px 20px;
}

/* CARD */
.card{
    max-width:900px;
    margin:20px auto;
    padding:30px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border:1px solid rgba(0,191,255,0.3);
    position:relative;
    overflow:hidden;
    transition:0.4s;
}

.card::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background: radial-gradient(circle, rgba(0,191,255,0.3) 0%, transparent 70%);
    top:-50%;
    left:-50%;
    opacity:0;
    transition:0.5s;
    pointer-events:none;
}

.card:hover{
    transform: translateY(-10px) scale(1.02);
    box-shadow:
        0 0 20px rgba(0,191,255,0.6),
        0 0 40px rgba(0,191,255,0.5),
        0 0 60px rgba(0,191,255,0.4),
        0 0 100px rgba(0,191,255,0.3);
    border:1px solid #00bfff;
}

.card:hover::before{
    opacity:1;
}

/* HOBBY */
.hobby{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:20px;
}

.box{
    width:80%;
    max-width:300px;
    padding:20px;
    border-radius:15px;
    text-align:center;
    background:rgba(255,255,255,0.05);
    border:1px solid #00bfff;
    cursor:pointer;
    transition:0.3s;
    position:relative;
    z-index:2;
}

.box:hover{
    transform:scale(1.1);
    box-shadow:0 0 30px #00bfff;
}

/* SOCIAL */
.social{
    text-align:center;
}

.social a{
    color:#ccc;
    font-size:28px;
    margin:0 10px;
    position:relative;
    z-index:2;
}

.social a:hover{
    color:#00bfff;
}

/* MAP */
iframe{
    border-radius:15px;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.modal-content{
    background:#111;
    padding:20px;
    border-radius:15px;
    text-align:center;
    border:2px solid #0f0;
}

.close{
    float:right;
    cursor:pointer;
    font-size:25px;
}
</style>
</head>

<body>

<!-- 🔥 BACKGROUND -->
<canvas id="bgCanvas"></canvas>
<div id="cursor-light"></div>

<div class="header">
    <img src="058563264cd7c2899bc6.jpg">
    <h1 id="name"></h1>
    <p>Sinh viên CNTT - Part Time</p>
</div>

<!-- (giữ nguyên toàn bộ phần HTML của bạn) -->

<script>
/* 🔥 BACKGROUND PARTICLE */
const canvasBg = document.getElementById("bgCanvas");
const ctxBg = canvasBg.getContext("2d");

canvasBg.width = window.innerWidth;
canvasBg.height = window.innerHeight;

let particles = [];

for(let i=0;i<100;i++){
    particles.push({
        x: Math.random()*canvasBg.width,
        y: Math.random()*canvasBg.height,
        r: Math.random()*2 + 1,
        dx: Math.random()*1 - 0.5,
        dy: Math.random()*1 - 0.5
    });
}

function animateBg(){
    ctxBg.clearRect(0,0,canvasBg.width,canvasBg.height);

    ctxBg.fillStyle = "#00bfff";

    particles.forEach(p=>{
        ctxBg.beginPath();
        ctxBg.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctxBg.fill();

        p.x += p.dx;
        p.y += p.dy;

        if(p.x<0||p.x>canvasBg.width) p.dx *= -1;
        if(p.y<0||p.y>canvasBg.height) p.dy *= -1;
    });

    requestAnimationFrame(animateBg);
}
animateBg();

/* 🔥 ÁNH SÁNG THEO CHUỘT */
const light = document.getElementById("cursor-light");

document.addEventListener("mousemove", e=>{
    light.style.left = e.clientX + "px";
    light.style.top = e.clientY + "px";
});
</script>

</body>
</html>
