<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Dangvanphungprogame</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    background: linear-gradient(135deg,#020b1c,#0a1f44,#000);
    color:white;
}

/* HEADER */
.header{
    text-align:center;
    padding:60px 20px;
}

.header img{
    width:140px;
    border-radius:50%;
    border:3px solid #00bfff;
    box-shadow:0 0 25px #00bfff;
    transition:0.4s;
}

.header img:hover{
    transform:scale(1.1);
    box-shadow:0 0 50px #00bfff;
}

/* TYPEWRITER */
#name{
    font-size:32px;
    margin-top:15px;
    color:#00bfff;
    border-right:3px solid #00bfff;
    display:inline-block;
    padding-right:5px;
    white-space:nowrap;
    overflow:hidden;
    animation: blink 0.7s infinite;
}

@keyframes blink{
    0%,100%{border-color:#00bfff;}
    50%{border-color:transparent;}
}

/* SECTION */
.section{
    padding:40px 20px;
}

/* CARD */
.card{
    max-width:900px;
    margin:20px auto;
    padding:30px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border:1px solid rgba(0,191,255,0.3);
    box-shadow:0 0 20px rgba(0,191,255,0.3);
    transition:0.4s;
}

.card:hover{
    transform:translateY(-10px);
    box-shadow:0 0 50px rgba(0,191,255,0.7);
}

/* HOBBY */
.hobby{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
}

.box{
    width:150px;
    padding:20px;
    border-radius:15px;
    text-align:center;
    background:rgba(255,255,255,0.05);
    border:1px solid #00bfff;
    cursor:pointer;
    transition:0.3s;
}

.box:hover{
    transform:scale(1.1);
    box-shadow:0 0 30px #00bfff;
}

/* CONTACT */
.email{
    color:#00bfff;
    text-align:center;
}

.social{
    text-align:center;
}

.social a{
    color:#ccc;
    font-size:28px;
    margin:0 10px;
    transition:0.3s;
}

.social a:hover{
    color:#00bfff;
    transform:scale(1.3);
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
    z-index:999;
}

.modal-content{
    background:rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    padding:30px;
    border-radius:20px;
    width:80%;
    max-width:500px;
    text-align:center;
    border:1px solid #00bfff;
    box-shadow:0 0 40px #00bfff;
}

/* MEME FIX */
#meme{
    position:fixed;
    bottom:20px;
    right:20px;
    width:110px;
    z-index:9999;
    animation: jump 1s infinite;
}

@keyframes jump{
    0%{ transform:translateY(0); }
    50%{ transform:translateY(-20px); }
    100%{ transform:translateY(0); }
}

</style>
</head>

<body>

<div class="header">
<img src="058563264cd7c2899bc6.jpg">
<h1 id="name"></h1>
<p>Sinh viên CNTT - Part Time</p>
</div>

<div class="section">
<div class="card">
<h2>📝 Một chút về tôi</h2>
<p>Xin chào, tôi là Đặng Văn Phụng.</p>
<p>Tôi là một người hòa đồng, thích lập trình và cuộc sống đơn giản.</p>
</div>
</div>

<div class="section">
<div class="card">
<h3>👤 Thông tin cá nhân</h3>
<p>📅 13 / 08 / 2007</p>
<p>📍 TP.HCM</p>
<p>🏠 Nghệ An</p>
</div>
</div>

<div class="section">
<div class="card">
<h2>Sở thích</h2>
<div class="hobby">
<div class="box" onclick="openModal('game')">🎮<p>Chơi game</p></div>
<div class="box" onclick="openModal('code')">💻<p>Lập trình</p></div>
<div class="box" onclick="openModal('music')">🎵<p>Nghe nhạc</p></div>
</div>
</div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span onclick="closeModal()" style="cursor:pointer;font-size:25px">×</span>
    <h2 id="modal-title"></h2>
    <p id="modal-text"></p>
  </div>
</div>

<!-- MEME (FIX LINK) -->
<img id="meme" src="https://i.imgur.com/8QfQKQG.gif"
onerror="this.src='https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif'">

<script>

/* TYPE LOOP */
const text = "Đặng Văn Phụng";
let i = 0;
let isDeleting = false;

function typeLoop(){
    const el = document.getElementById("name");

    if(!isDeleting){
        el.innerHTML = text.substring(0, i + 1);
        i++;
        if(i === text.length){
            isDeleting = true;
            setTimeout(typeLoop, 1500);
            return;
        }
    }else{
        el.innerHTML = text.substring(0, i - 1);
        i--;
        if(i === 0){
            isDeleting = false;
        }
    }

    setTimeout(typeLoop, isDeleting ? 50 : 100);
}

window.onload = typeLoop;

/* MODAL */
function openModal(type){
    const title = document.getElementById("modal-title");
    const text = document.getElementById("modal-text");

    if(type === "game"){
        title.innerHTML = "🎮 Chơi game";
        text.innerHTML = "Tôi thích chơi game giải trí.";
    }

    if(type === "code"){
        title.innerHTML = "💻 Lập trình";
        text.innerHTML = "Tôi thích làm web đẹp và hiện đại.";
    }

    if(type === "music"){
        title.innerHTML = "🎵 Nghe nhạc";
        text.innerHTML = "Tôi thích nhạc chill và remix.";
    }

    document.getElementById("modal").style.display = "flex";
}

function closeModal(){
    document.getElementById("modal").style.display = "none";
}

</script>

</body>
</html>
